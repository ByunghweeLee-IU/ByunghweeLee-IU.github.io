    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/contrib/auto-render.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ],
                throwOnError: false,
                ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
                ignoredClasses: ['no-katex']
            });
        });

        document.addEventListener("DOMContentLoaded", function() {
            const homepagePaths = new Set(["index", "research", "publications", "talks", "cv"]);
            const pagePath = document.body.dataset.pagePath || "";
            const currentDir = pagePath.includes("/") ? pagePath.slice(0, pagePath.lastIndexOf("/")) : "";

            const normalize = (value) => {
                const parts = [];
                for (const part of value.split("/")) {
                    if (!part || part === ".") continue;
                    if (part === "..") {
                        parts.pop();
                    } else {
                        parts.push(part);
                    }
                }
                return parts.join("/");
            };

            const toSiteUrl = (sourcePath) => {
                const withoutExt = sourcePath.replace(/\.md$/, "").replace(/\/index$/, "").replace(/\/$/, "");
                if (homepagePaths.has(withoutExt)) {
                    return withoutExt === "index" ? "/index/" : `/${withoutExt}/`;
                }
                return `/wiki/${withoutExt}/`;
            };

            document.querySelectorAll('a[href]').forEach((link) => {
                const href = link.getAttribute("href");
                if (!href) return;
                if (href.startsWith("http://") || href.startsWith("https://")) return;
                if (href.startsWith("#") || href.startsWith("/") || href.startsWith("mailto:")) return;

                const extMatch = href.match(/\.([a-zA-Z0-9]+)$/);
                if (extMatch && extMatch[1].toLowerCase() !== "md") return;

                const resolved = normalize(`/${currentDir}/${href}`).replace(/^\/+/, "");
                link.setAttribute("href", toSiteUrl(resolved));
            });
        });
    </script>
